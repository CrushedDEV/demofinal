<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nexify · Estudio de marketing gamificado y mini-juegos de marca</title>
  <meta name="description" content="Nexify es un estudio creativo especializado en marketing gamificado: mini-juegos de marca, playable ads, integraciones de stream y campañas con creadores. De la idea al live en 4 semanas." />
  <meta name="keywords" content="marketing gamificado, mini-juegos de marca, playable ads, agencia de gaming marketing, campañas con creadores, branded games" />
  <meta property="og:title" content="Nexify · Marketing gamificado que sí funciona" />
  <meta property="og:description" content="Estudio creativo de mini-juegos de marca, playable ads y experiencias interactivas para redes, streams y eventos." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="assets/favicon.svg" />
  <link rel="stylesheet" href="landing.css" />
  <link rel="stylesheet" href="pages.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="landing-components.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "heroVariant": "ink",
      "processVariant": "timeline"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const logoVariant = 'white';
      return (
        <div data-screen-label="01 Home">
          <Nav logoVariant={logoVariant} active="inicio" />
          <Hero variant={t.heroVariant} />
          <WhatIsNexify />
          <Services />
          <Process variant={t.processVariant} />
          <Cases />
          <Creators />
          <FAQ />
          <FinalCTA />
          <Footer />

          <TweaksPanel title="Tweaks">
            <TweakSection label="Hero" />
            <TweakRadio
              label="Fondo"
              value={t.heroVariant}
              onChange={v => setTweak('heroVariant', v)}
              options={[
                { label: 'Ink', value: 'ink' },
                { label: 'Paper', value: 'paper' },
                { label: 'Yellow', value: 'yellow' },
              ]}
            />
            <TweakSection label="Cómo funciona" />
            <TweakRadio
              label="Layout"
              value={t.processVariant}
              onChange={v => setTweak('processVariant', v)}
              options={[
                { label: 'Timeline', value: 'timeline' },
                { label: 'Stack', value: 'stack' },
              ]}
            />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
